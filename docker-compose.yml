services:

  backend:
    build:
      context: ./backend

    container_name: ai_ops_backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - postgres


  frontend:
    build:
      context: ./frontend

    container_name: ai_ops_frontend

    ports:
      - "3000:80"

    depends_on:
      - backend


  postgres:
    image: postgres:16

    container_name: ai_ops_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: operations_center

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


volumes:
  postgres_data: